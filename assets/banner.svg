<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Expert Mode banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="320" rx="16" fill="url(#bg)"/>

  <!-- faint grid -->
  <g stroke="#334155" stroke-width="1" opacity="0.35">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="300" y1="0" x2="300" y2="320"/>
    <line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="900" y1="0" x2="900" y2="320"/>
  </g>

  <!-- left: title -->
  <text x="80" y="140" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="64" font-weight="800" fill="#f8fafc">Expert Mode</text>
  <rect x="82" y="162" width="240" height="6" rx="3" fill="url(#accent)"/>
  <text x="80" y="212" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="24" fill="#94a3b8">"Act as an expert" is a wish, not a spec.</text>
  <text x="80" y="246" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="24" fill="#94a3b8">This skill turns it into one.</text>

  <!-- right: five-dimension stack -->
  <g font-family="'SF Mono', ui-monospace, Menlo, Consolas, monospace" font-size="17">
    <g>
      <rect x="760" y="52" width="360" height="38" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
      <rect x="760" y="52" width="6" height="38" rx="3" fill="#38bdf8"/>
      <text x="782" y="77" fill="#e2e8f0">role + seniority</text>
    </g>
    <g>
      <rect x="760" y="98" width="360" height="38" rx="8" fill="#1e293b" stroke="#4cabf0" stroke-width="1.5"/>
      <rect x="760" y="98" width="6" height="38" rx="3" fill="#4cabf0"/>
      <text x="782" y="123" fill="#e2e8f0">industry + domain context</text>
    </g>
    <g>
      <rect x="760" y="144" width="360" height="38" rx="8" fill="#1e293b" stroke="#609ae9" stroke-width="1.5"/>
      <rect x="760" y="144" width="6" height="38" rx="3" fill="#609ae9"/>
      <text x="782" y="169" fill="#e2e8f0">methodology</text>
    </g>
    <g>
      <rect x="760" y="190" width="360" height="38" rx="8" fill="#1e293b" stroke="#7490e1" stroke-width="1.5"/>
      <rect x="760" y="190" width="6" height="38" rx="3" fill="#7490e1"/>
      <text x="782" y="215" fill="#e2e8f0">constraints</text>
    </g>
    <g>
      <rect x="760" y="236" width="360" height="38" rx="8" fill="#1e293b" stroke="#818cf8" stroke-width="1.5"/>
      <rect x="760" y="236" width="6" height="38" rx="3" fill="#818cf8"/>
      <text x="782" y="261" fill="#e2e8f0">output format</text>
    </g>
  </g>
</svg>
